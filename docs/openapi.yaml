openapi: 3.1.0

info:
  title: Zoo API
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local developement server

tags:
  - name: Authentication
    description: Authentication-related endpoints
  - name: Zoo
    description: Zoo-related endpoints
  - name: Animal
    description: Animal-related endpoints
  - name: Review
    description: Review-related endpoints
  - name: User
    description: User-related endpoints
  - name: Monitoring
    description: Operational endpoints, such as health check

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the status of the API. Used by Render to verify the API is operating.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  
  /api/auth/signup:
    post:
      summary: Signup a user
      description: Signup a user with the provided credentials
      tags:
        - Authentication
      requestBody:
        description: User signup credentials.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '201':
          description: User is signed up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'
        
  /api/auth/login:
    post:
      summary: Login a user
      description: Logs in a user with the provided credentials
      tags:
        - Authentication
      requestBody:
        description: User login credentials.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: User is logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  acessesToken:
                    type: String
                example:
                  acessesToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6NSwicm9sZSI6IlVTRVIiLCJpYXQiOjE3NzY4MTQzMjgsImV4cCI6MTc3NjgxNzkyOH0.hLXMyd4Zp_uFzbxv5ZyMKQvr7q7ghNPZ-h0Id9saOBE'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Email or password is invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/user:
    get:
      summary: Get all user
      description: Gets all user. Administrators Only 
      security:
        - bearerAuth: []
      tags:
        - User
      responses:
        '200':
          description: User retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    post:
      summary: Create an user
      description: Creates a user using the provided data. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - User
      requestBody:
        description: Create user data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/user/{id}:
    get:
      summary: Get User by Id
      description: Get a user by it's Id. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - User
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the user to get
      responses:
        '200':
          description: Retrieved user successfully
          content:
            application/json:
              schema:
                $ref: '#/componenets/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    put:
      summary: Update a User
      description: Updates a user of a given id with the given data. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - User
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the user to update
      requestBody:
        description: The data to update the user with
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Updated user successfully
          content:
            application/json:
              schema:
                $ref: '#/componenets/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    delete:
      summary: Delete User by Id
      description: Delete a user by it's Id. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - User
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the user to delete
      responses:
        '204':
          description: Deleted user successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                example:
                  message: 'User deleted successfully'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/zoo:
    get:
      tags:
        - Zoo
      summary: Get all zoo
      description: Retrieve all zoo data from the database
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Zoo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    post:
      tags:
        - Zoo
      security:
        - bearerAuth: []
      summary: Create a zoo
      description: Create a zoo with provided JSON body
      requestBody:
        required: true
        description: The data to create a zoo from
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Zoo'
      responses:
        '201':
          description: Zoo created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zoo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidZooInput'
        '409':
          $ref: '#/components/responses/ZooConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/zoo/{id}:
    get:
      tags:
        - Zoo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the zoo to get  
      summary: Get a zoo by Id
      description: Retrieve a zoo based on the id provided
      responses:
        '200':
          description: Zoo retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zoo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    put:
      tags:
        - Zoo
      security:
        - bearerAuth: []
      summary: Update a zoo by Id
      description: Update the zoo with the given Id
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the zoo to update
      requestBody:
        required: true
        description: The data to update the zoo with
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Zoo'
      responses:
        '200':
          description: Zoo updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zoo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidZooInput'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ZooConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    delete:
      tags:
        - Zoo
      security:
        - bearerAuth: []
      summary: Delete a zoo by Id
      description: Delete the zoo with the given Id
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the zoo to update
      responses:
        '204':
          description: Deleted zoo successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                example:
                  message: 'Zoo was successfully deleted.'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/review/:
    get:
      tags:
        - Review
      security:
        - bearerAuth: []
      summary: Get all reviews
      description: Retrieve all reviews
      responses:
        '200':
          description: Successfully retrieved all reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    post:
      tags:
        - Review
      security:
        - bearerAuth: []
      summary: Create a review
      description: Create a review with the provided data
      requestBody:
        required: true
        description: The data to create the review from
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
      responses:
        '201':
          description: Successfully created a review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidReviewInput'
        '409':
          $ref: '#/components/responses/ReviewConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'
      
  /api/review/{id}:
    get:
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the review to get
      summary: Get a review by id
      description: Retrieve a review by the id provided
      responses:
        '200':
          description: Successfully retrieved review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    put:
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the review to update
      requestBody:
        required: true
        description: The data to update the review
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Review'
      responses:
        '200':
          description: Successfully updated review
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidReviewInput'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/ReviewConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    delete:
      tags:
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the review to delete
      responses:
        '204':
          description: Successfully deleted a review
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                example:
                  message: 'Review was successfully deleted'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/animal/:
    get:
      tags:
        - Animal
      security:
        - bearerAuth: []
      summary: Get all animals
      description: Retrieve all animals
      responses:
        '200':
          description: Successfully retrieved all animals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Animal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    post:
      tags:
        - Animal
      security:
        - bearerAuth: []
      summary: Create a animal
      description: Create a animal with the provided data
      requestBody:
        required: true
        description: The data to create the animal from
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Animal'
      responses:
        '201':
          description: Successfully created a animal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidAnimalInput'
        '409':
          $ref: '#/components/responses/AnimalConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'
      
  /api/animal/{id}:
    get:
      tags:
        - Animal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the animal to get
      summary: Get a animal by id
      description: Retrieve a animal by the id provided
      responses:
        '200':
          description: Successfully retrieved animal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    put:
      tags:
        - Animal
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the animal to update
      requestBody:
        required: true
        description: The data to update the animal
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Animal'
      responses:
        '200':
          description: Successfully updated animal
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Animal'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidAnimalInput'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/AnimalConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    delete:
      tags:
        - Animal
      security:
        - bearerAuth: []
      parameters:
