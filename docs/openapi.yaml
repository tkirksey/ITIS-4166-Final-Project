openapi: 3.1.0

info:
  title: Zoo API
  version: 1.0.0

servers:
  - url: http://localhost:3000
    description: Local developement server

tags:
  - name: Authentications
    description: Authentication-related endpoints
  - name: Zoos
    description: Zoo-related endpoints
  - name: Animals
    description: Animal-related endpoints
  - name: Reviews
    description: Review-related endpoints
  - name: Users
    description: User-related endpoints
  - name: Monitoring
    description: Operational endpoints, such as health check

paths:
  /health:
    get:
      summary: Health Check
      description: Returns the status of the API. Used by Render to verify the API is operating.
      tags:
        - Monitoring
      responses:
        '200':
          description: API is running successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  
  /auth/signup:
    post:
      summary: Signup a user
      description: Signup a user with the provided credentials
      tags:
        - Authentications
      requestBody:
        description: User signup credentials.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '201':
          description: User is signed up
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'
        
  /auth/login:
    post:
      summary: Login a user
      description: Logs in a user with the provided credentials
      tags:
        - Authentications
      requestBody:
        description: User login credentials.
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthCredentials'
      responses:
        '200':
          description: User is logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  acessesToken:
                    type: String
                example:
                  acessesToken: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6NSwicm9sZSI6IlVTRVIiLCJpYXQiOjE3NzY4MTQzMjgsImV4cCI6MTc3NjgxNzkyOH0.hLXMyd4Zp_uFzbxv5ZyMKQvr7q7ghNPZ-h0Id9saOBE'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '401':
          description: Email or password is invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                example:
                  error: 'Invalid credentials'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /user:
    get:
      summary: Get all users
      description: Gets all users. Administrators Only 
      security:
        - bearerAuth: []
      tags:
        - Users
      responses:
        '200':
          description: Users retrieved successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    post:
      summary: Create an user
      description: Creates a user using the provided data. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - Users
      requestBody:
        description: Create user data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '201':
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidUserInput'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /user/{id}:
    get:
      summary: Get User by Id
      description: Get a user by it's Id. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - Users
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the user to get
      responses:
        '200':
          description: Retrieved user successfully
          content:
            application/json:
              schema:
                $ref: '#/componenets/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    put:
      summary: Update a User
      description: Updates a user of a given id with the given data. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - Users
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the user to update
      requestBody:
        description: The data to update the user with
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/User'
      responses:
        '200':
          description: Updated user successfully
          content:
            application/json:
              schema:
                $ref: '#/componenets/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          description: Invalid Id or data provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  errors:
                    type: array
                    items:
                      type: string
                example:
                  errors:
                    - "Field 'email' is not an email"
                    - "Field 'password' needs to be between 8-64 characters"
                    - "Field 'role' must be either 'USER' or 'ADMIN'"
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/EmailConflict'
        '429':
          $ref: '#/components/responses/RateLimitHit'

    delete:
      summary: Delete User by Id
      description: Delete a user by it's Id. Administrators Only
      security:
        - bearerAuth: []
      tags:
        - Users
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The Id of the user to delete
      responses:
        '204':
          description: Deleted user successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                example:
                  message: 'User deleted successfully'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

components:
  schemas:
    Zoo:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        name:
          type: string
          example: 'Green Zoo'
        location:
          type: string
          example: 'Charlotte, NC'
        yearOpened:
          type: integer
          example: 2026
        ownerId:
          type: integer
          example: 1
    
    Animal:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        species:
          type: string
          example: 'Lion'
        nickname:
          type: string
          example: 'Alex'
        zooId:
          type: integer
          example: 1
    
    User:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        email:
          type: string
          example: 'example@example.com'
        password:
          writeOnly: true
          type: string
          example: 'password123'
        role:
          $ref: '#/components/schemas/Role'
          example: 'USER'
          readOnly: true
    
    Review:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        rating:
          type: integer
          example: 4
        content:
          type: string
          example: 'Green Zoo was a great time with the family, though the bathrooms were very dirty.'
        authorId:
          readOnly: true
          type: integer
          example: 1
        zooId:
          readOnly: true
          type: integer
          example: 1

    Role:
      type: string
      enum:
        - 'USER'
        - 'ADMIN'
    
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
          example: 'example@example.com'
        password:
          type: string
          example: 'password123'
    
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example: 
              error: 'Resource 1 not found'
    
    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: array
            items:
              type: string
            example:
              errors: ['ID must be a positive integer']

    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token.'
    
    InvalidUserInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Field 'email' is missing"
                - "Field 'password' is missing"

    NotPermitted:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Forbidden: insufficient permission.'

    RateLimitHit:
      description: The client has tried to make too many connections and the rate limiter was hit
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Too many requests. Try again later'

    EmailConflict:
      description: Email already in use
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Conflict: Email is already in use'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT