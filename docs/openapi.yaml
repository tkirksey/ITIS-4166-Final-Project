        '403':
          $ref: '#/components/responses/NotPermitted'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  /api/user/{id}/zoos/:
    get:
      tags:
        - User
        - Zoo
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the user
      summary: Get zoos owned by a user 
      description: Retrieve all zoos owned by a user with a given id
      responses:
        '200':
          description: Successfully retrieved zoos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Zoo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'
  
  /api/user/{id}/reviews:
    get:
      tags:
        - User
        - Review
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: The id of the user
      summary: Get reviews written by a user 
      description: Retrieve all reviews written by a user with a given id
      responses:
        '200':
          description: Successfully retrieved reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Review'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '400':
          $ref: '#/components/responses/InvalidId'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimitHit'

  

components:
  schemas:
    Zoo:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        name:
          type: string
          example: 'Green Zoo'
        location:
          type: string
          example: 'Charlotte, NC'
        yearOpened:
          type: integer
          example: 2026
        ownerId:
          type: integer
          example: 1
    
    Animal:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        species:
          type: string
          example: 'Lion'
        nickname:
          type: string
          example: 'Alex'
        zooId:
          type: integer
          example: 1
    
    User:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        email:
          type: string
          example: 'example@example.com'
        password:
          writeOnly: true
          type: string
          example: 'password123'
        role:
          $ref: '#/components/schemas/Role'
          example: 'USER'
          readOnly: true
    
    Review:
      type: object
      properties:
        id:
          readOnly: true
          type: integer
          example: 1
        rating:
          type: integer
          example: 4
        content:
          type: string
          example: 'Green Zoo was a great time with the family, though the bathrooms were very dirty.'
        authorId:
          readOnly: true
          type: integer
          example: 1
        zooId:
          readOnly: true
          type: integer
          example: 1

    Role:
      type: string
      enum:
        - 'USER'
        - 'ADMIN'
    
    AuthCredentials:
      type: object
      properties:
        email:
          type: string
          example: 'example@example.com'
        password:
          type: string
          example: 'password123'
    
  responses:
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example: 
              error: 'Resource 1 not found'
    
    InvalidId:
      description: Invalid ID
      content:
        application/json:
          schema:
            type: array
            items:
              type: string
            example:
              errors: ['ID must be a positive integer']

    Unauthorized:
      description: Client is not authenticated
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Not authenticated. Please provide a valid token.'
    
    InvalidUserInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Field 'email' is missing"
                - "Field 'password' is missing"

    InvalidZooInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Field 'name' is missing"
                - "Field 'location' is missing"

    NotPermitted:
      description: Client is not authorized
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Forbidden: insufficient permission.'

    RateLimitHit:
      description: The client has tried to make too many connections and the rate limiter was hit
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Too many requests. Try again later'

    EmailConflict:
      description: Email already in use
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Conflict: Email is already in use'

    ZooConflict:
      description: Zoo creation/updating had conflicts
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Conflict: owner already has a zoo with this name in this location'

    InvalidReviewInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Field 'content' is missing"
                - "Field 'rating' is missing"

    ReviewConflict:
      description: Review creation/updating had conflicts
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Conflict: Owner already has a review for this zoo'

    InvalidAnimalInput:
      description: Bad request due to invalid data
      content:
        application/json:
          schema:
            type: object
            properties:
              errors:
                type: array
                items:
                  type: string
            example:
              errors:
                - "Field 'nickname' is missing"
                - "Field 'species' is missing"

    AnimalConflict:
      description: Animal creation/updating had conflicts
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
            example:
              error: 'Conflict: An animal with this nickname and species already exists at this zoo'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
